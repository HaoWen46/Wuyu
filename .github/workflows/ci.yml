name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dart:
    name: Dart (wuyu_dart)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        working-directory: wuyu_dart
        run: dart pub get

      - name: Analyze
        working-directory: wuyu_dart
        run: dart analyze

      - name: Test
        working-directory: wuyu_dart
        run: dart test

  python:
    name: Python (src/wuyu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Run tests
        run: uv run pytest tests/ -v
